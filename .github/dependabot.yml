version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      next:
        patterns: ["next", "eslint-config-next", "@next/*"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      prisma:
        patterns: ["prisma", "@prisma/*"]
      testing:
        patterns: ["vitest", "playwright", "@playwright/*"]
      ai:
        patterns: ["@trigger.dev/*", "ai", "@ai-sdk/*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
